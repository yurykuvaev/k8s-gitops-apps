apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: whoami-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/yurykuvaev/k8s-gitops-apps
    targetRevision: main
    path: apps/whoami/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
