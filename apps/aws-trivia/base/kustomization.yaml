apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base manifests shared by all environments. Overlays add namespace,
# replica count, ingress host, and the image tag CI bumps.
resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # ConfigMap aws-trivia-config (DB host/port/etc) is owned by Terraform —
  # the values depend on the live RDS endpoint and get refreshed on every
  # apply. See eks-test-env/k8s_resources.tf.
