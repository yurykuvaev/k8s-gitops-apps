apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-trivia
  labels:
    app: aws-trivia
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-trivia
  template:
    metadata:
      labels:
        app: aws-trivia
    spec:
      containers:
        - name: app
          # Replace with your image registry, e.g.:
          #   748415433090.dkr.ecr.us-east-1.amazonaws.com/aws-trivia:0.1.0
          image: aws-trivia:latest
          ports:
            - containerPort: 8000
              name: http
          env:
            # Source vars must be declared BEFORE any env that references them
            # via $(VAR) — kubelet substitutes only based on earlier entries.
            - name: DB_HOST
              valueFrom: { configMapKeyRef: { name: aws-trivia-config, key: DB_HOST } }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: aws-trivia-config, key: DB_PORT } }
            - name: DB_NAME
              valueFrom: { configMapKeyRef: { name: aws-trivia-config, key: DB_NAME } }
            - name: DB_USER
              valueFrom: { configMapKeyRef: { name: aws-trivia-config, key: DB_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: aws-trivia-db, key: DB_PASSWORD } }
            # Composed connection string — must be after all referenced vars.
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
          resources:
            requests: { cpu: 50m,  memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
      # Spread replicas across nodes for resilience.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: aws-trivia
