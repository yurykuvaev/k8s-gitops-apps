# Reuses the same ALB as aws-trivia via the shared `group.name: lab-dev`.
# AWS LB Controller adds a host-based listener rule for whoami.lab.yurykuvaev.com.
# ExternalDNS will create the matching Route53 record automatically.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/group.name: lab-dev
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  rules:
    - host: whoami.lab.yurykuvaev.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: whoami
                port:
                  number: 80
